<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Junktions Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh;color:#1a1a1a}
.screen{display:none;min-height:100vh;padding:1rem;flex-direction:column;align-items:center}
.screen.active{display:flex}
.topnav{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:0.75rem 0 1.25rem;border-bottom:1px solid #e0e0de;margin-bottom:1.25rem}
.topnav h1{font-size:18px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.nav-links{display:flex;gap:4px}
.nav-link{font-size:12px;color:#666;cursor:pointer;background:none;border:1px solid #ccc;padding:5px 12px;border-radius:99px;font-family:inherit;font-weight:500}
.nav-link:hover{background:#e8e8e6;color:#1a1a1a;border-color:#bbb}
.nav-link.active-tab{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.nav-link.admin-link{font-size:11px;color:#aaa;border-color:#e0e0de;padding:4px 10px}
.nav-link.admin-link:hover{color:#666;background:#f0f0ee}
.nav-link.admin-link.active-tab{background:#555;color:#fff;border-color:#555}
.bottom-admin{width:100%;max-width:520px;display:flex;justify-content:center;padding:2rem 0 1rem}

.pagination{display:flex;gap:6px;justify-content:center;align-items:center;margin-top:1.25rem;padding-bottom:1rem}
.page-btn{font-size:13px;font-weight:500;width:34px;height:34px;border-radius:8px;border:1px solid #e0e0de;background:#fff;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background 0.1s}
.page-btn:hover{background:#f0f0ee;color:#1a1a1a}
.page-btn.current{background:#1a1a1a;color:#fff;border-color:#1a1a1a;cursor:default}
.page-btn.ellipsis{border:none;background:none;cursor:default;color:#aaa;width:auto;padding:0 2px}

.game-wrap{width:100%;max-width:520px}
.puzzle-date{font-size:13px;color:#888;text-align:center;margin-bottom:1rem}
.instructions{font-size:13px;color:#555;text-align:center;margin-bottom:1rem}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.tile{background:#e8e8e6;border:none;border-radius:8px;height:72px;cursor:pointer;font-size:13px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;transition:background 0.1s,transform 0.1s;user-select:none;line-height:1.3;padding:6px;text-transform:uppercase;letter-spacing:0.02em}
.tile:hover{background:#d8d8d6}
.tile.selected{background:#5a5a58;color:#fff;transform:scale(0.97)}
.tile.wrong{background:#5a5a58;color:#fff}
.tile.shake{animation:shake 0.4s}
.tile.pop{animation:pop 0.3s}
.tile.correct-flash{animation:correctflash 0.5s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes correctflash{0%{opacity:1}50%{opacity:0.5}100%{opacity:1}}

.solved-row{border-radius:8px;padding:0.75rem 1rem;margin-bottom:8px;display:flex;flex-direction:column;gap:3px;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.solved-row .cat-label{font-size:12px;font-weight:700;opacity:1;letter-spacing:0.06em;text-transform:uppercase;color:white}
.solved-row .cat-words{font-size:13px;font-weight:500;color:white}

.guesses-wrap{display:flex;align-items:center;gap:8px;margin:0.25rem 0 1rem;font-size:13px;color:#888;justify-content:center}
.bubble{width:11px;height:11px;border-radius:50%;background:#5a5a58;display:inline-block;transition:background 0.2s}
.bubble.used{background:#d0cfc8}
.bubbles{display:flex;gap:5px}

.btn-row{display:flex;gap:8px;justify-content:center;margin-bottom:0.75rem}
button{font-family:inherit;font-size:13px;cursor:pointer;border-radius:99px;padding:8px 20px;border:1px solid #ccc;background:#fff;color:#1a1a1a;transition:background 0.1s;font-weight:500}
button:hover{background:#f0f0ee}
button:disabled{opacity:0.35;cursor:default}
.btn-primary{background:#1a1a1a;color:#fff;border-color:transparent;border-radius:99px}
.btn-primary:hover{background:#333}
.btn-primary:disabled{background:#1a1a1a}

.one-away{text-align:center;font-size:13px;color:#555;min-height:20px;margin-bottom:0.5rem;font-weight:500}

.result-panel{margin-top:1rem;padding:1.25rem;background:#fff;border-radius:12px;border:1px solid #e0e0de;text-align:center}
.result-panel h2{font-size:16px;font-weight:600;margin-bottom:4px}
.result-panel .sub{font-size:13px;color:#888;margin-bottom:1rem}
.share-grid{display:flex;flex-direction:column;gap:3px;align-items:center;margin-bottom:1rem}
.share-row{display:flex;gap:3px}
.share-sq{width:24px;height:24px;border-radius:4px;display:inline-block}
.copy-btn{background:#1a1a1a;color:#fff;border:none;border-radius:99px;padding:10px 24px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.copy-btn:hover{background:#333}
.copy-confirm{font-size:12px;color:#2e7d32;margin-top:6px;min-height:18px}

.no-puzzle{text-align:center;padding:3rem 1rem;color:#888;font-size:15px;line-height:1.8}
.no-puzzle strong{color:#1a1a1a;display:block;font-size:17px;margin-bottom:0.5rem}

/* ARCHIVE */
.archive-wrap{width:100%;max-width:520px}
.archive-empty{text-align:center;padding:3rem 1rem;color:#888;font-size:14px}
.archive-list{display:flex;flex-direction:column;gap:8px}
.archive-item{background:#fff;border:1px solid #e0e0de;border-radius:10px;padding:0.85rem 1rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.1s}
.archive-item:hover{background:#f8f8f6}
.archive-item .date{font-size:14px;font-weight:600;color:#1a1a1a}
.archive-item .cats{font-size:12px;color:#888;margin-top:2px}
.archive-dots{display:flex;gap:4px}
.archive-dot{width:10px;height:10px;border-radius:50%}
.archive-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:#e8f5e9;color:#2e7d32}
.archive-badge.played{background:#f0f0ee;color:#888}

/* ADMIN */
.admin-wrap{width:100%;max-width:540px}
.admin-subhead{font-size:13px;color:#888;margin-bottom:1.25rem}
.login-card{background:#fff;border:1px solid #e0e0de;border-radius:12px;padding:2rem;max-width:320px;margin:2rem auto;display:flex;flex-direction:column;gap:12px}
.login-card h2{font-size:16px;font-weight:600;text-align:center}
.login-card input[type=password]{width:100%;padding:9px 12px;font-size:14px;border:1px solid #ccc;border-radius:8px;background:#f5f5f3;color:#1a1a1a;font-family:inherit}
.login-card input[type=password]:focus{outline:none;border-color:#888}
.login-error{font-size:12px;color:#c0392b;text-align:center;min-height:16px}
.cat-card{background:#fff;border:1px solid #e0e0de;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.cat-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.diff-label{font-size:11px;font-weight:700;letter-spacing:0.05em;padding:3px 10px;border-radius:99px;color:white;text-transform:uppercase}
.cat-card label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.cat-card input[type=text]{width:100%;padding:8px 10px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#f5f5f3;color:#1a1a1a;font-family:inherit;margin-bottom:10px}
.cat-card input[type=text]:focus{outline:none;border-color:#888}
.words-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.words-grid input{width:100%;padding:7px 8px;font-size:12px;border:1px solid #ccc;border-radius:8px;background:#f5f5f3;color:#1a1a1a;font-family:inherit;text-align:center}
.words-grid input:focus{outline:none;border-color:#888}
.admin-date-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;background:#fff;border:1px solid #e0e0de;border-radius:10px;padding:0.85rem 1rem}
.admin-date-row label{font-size:13px;color:#555;font-weight:500;white-space:nowrap}
.admin-date-row input[type=date]{flex:1;font-size:13px;padding:6px 10px;border:1px solid #ccc;border-radius:8px;background:#f5f5f3;color:#1a1a1a;font-family:inherit}
.admin-footer{display:flex;gap:8px;justify-content:flex-end;align-items:center;margin-top:1rem;flex-wrap:wrap}
.publish-status{font-size:12px;color:#2e7d32;margin-right:auto;font-weight:500}
.pub-error{color:#c0392b}

/* Out-of-guesses modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:16px;padding:2rem 1.75rem;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18);animation:popUp 0.25s}
@keyframes popUp{from{transform:scale(0.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal h2{font-size:17px;font-weight:700;margin-bottom:0.5rem;color:#1a1a1a}
.modal p{font-size:14px;color:#555;line-height:1.55;margin-bottom:1.5rem}
.modal-btns{display:flex;flex-direction:column;gap:10px}
.modal-btns button{width:100%;padding:11px 0;font-size:14px;font-weight:600;border-radius:99px;cursor:pointer;font-family:inherit;border:none;transition:opacity 0.15s}
.modal-btns button:hover{opacity:0.85}
.btn-keep{background:#1a1a1a;color:#fff}
.btn-reveal{background:#f0f0ee;color:#1a1a1a;border:1px solid #ccc !important}
</style>
</head>
<body>

<div id="game-screen" class="screen active">
  <div class="topnav">
    <h1>JUNKTIONS GAME</h1>
    <div class="nav-links">
      <button class="nav-link active-tab" onclick="showGame()">Today</button>
      <button class="nav-link" onclick="showArchive()">Archive</button>
    </div>
  </div>
  <div class="game-wrap" id="game-wrap"></div>
  <div class="bottom-admin"><button class="nav-link admin-link" onclick="showAdmin()">admin</button></div>
</div>

<div id="archive-screen" class="screen">
  <div class="topnav">
    <h1>JUNKTIONS GAME</h1>
    <div class="nav-links">
      <button class="nav-link" onclick="showGame()">Today</button>
      <button class="nav-link active-tab" onclick="showArchive()">Archive</button>
    </div>
  </div>
  <div class="archive-wrap" id="archive-wrap"></div>
  <div class="bottom-admin"><button class="nav-link admin-link" onclick="showAdmin()">admin</button></div>
</div>

<div id="admin-screen" class="screen">
  <div class="topnav">
    <h1>JUNKTIONS GAME</h1>
    <div class="nav-links">
      <button class="nav-link" onclick="showGame()">Today</button>
      <button class="nav-link" onclick="showArchive()">Archive</button>
      <button class="nav-link admin-link active-tab">admin</button>
    </div>
  </div>
  <div class="admin-wrap" id="admin-wrap"></div>
</div>

<script>
// ---- SUPABASE CONFIG ----
const SUPA_URL = 'https://rxawacmqqllulfpkahaw.supabase.co';
const SUPA_KEY = 'sb_publishable_6URuq2HFMdaaZUQpUAdlew_Q8r0zEuB';

async function dbGetPuzzle(dateKey) {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/puzzles?date=eq.${dateKey}&select=data`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    const rows = await res.json();
    if (rows && rows.length > 0) return rows[0].data;
  } catch(e) { console.error('dbGetPuzzle', e); }
  return null;
}

async function dbGetAllPuzzles() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/puzzles?select=date,data&order=date.desc`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    const rows = await res.json();
    if (Array.isArray(rows)) {
      const obj = {};
      rows.forEach(r => { obj[r.date] = r.data; });
      return obj;
    }
  } catch(e) { console.error('dbGetAllPuzzles', e); }
  return {};
}

async function dbSavePuzzle(dateKey, puzzleData) {
  const res = await fetch(`${SUPA_URL}/rest/v1/puzzles`, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ date: dateKey, data: puzzleData, published_at: new Date().toISOString() })
  });
  return res.ok;
}

async function dbDeletePuzzle(dateKey) {
  const res = await fetch(`${SUPA_URL}/rest/v1/puzzles?date=eq.${dateKey}`, {
    method: 'DELETE',
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  });
  return res.ok;
}

const CATS = [
  {key:'y', label:'Easy',   color:'#E9A84B'},
  {key:'g', label:'Medium', color:'#6AAF5B'},
  {key:'b', label:'Hard',   color:'#5B8FCF'},
  {key:'p', label:'Tricky', color:'#A67BC8'},
];
const CAT_EMOJI = ['🟨','🟩','🟦','🟪'];
const MAX_GUESSES = 4;
const PASS = 'puzzle2025';
let adminAuthed = false;
let gameState = {};
let currentArchiveDate = null;

function todayKey() {
  return new Date().toISOString().slice(0,10);
}
function getAllPuzzles() {
  try { return JSON.parse(localStorage.getItem('cx_puzzles') || '{}'); } catch { return {}; }
}
// Local cache for puzzles fetched this session
const _puzzleCache = {};

async function getPuzzle(dateKey) {
  const dk = dateKey || todayKey();
  if (_puzzleCache[dk]) return _puzzleCache[dk];
  const p = await dbGetPuzzle(dk);
  if (p) _puzzleCache[dk] = p;
  return p;
}
async function getAllPuzzles() {
  return await dbGetAllPuzzles();
}
async function savePuzzle(dateKey, p) {
  _puzzleCache[dateKey] = p;
  return await dbSavePuzzle(dateKey, p);
}
function getProgress(dateKey) {
  try { return JSON.parse(localStorage.getItem('cx_prog_' + (dateKey||todayKey())) || 'null'); } catch { return null; }
}
function saveProgress(dateKey, s) {
  localStorage.setItem('cx_prog_' + (dateKey||todayKey()), JSON.stringify(s));
}
function formatDateDisplay(key) {
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

// ---- NAV ----
function showGame(dateKey) {
  currentArchiveDate = dateKey || null;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('game-screen').classList.add('active');
  renderGame(dateKey);
}
function showArchive() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('archive-screen').classList.add('active');
  renderArchive();
}
function showAdmin() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('admin-screen').classList.add('active');
  renderAdmin();
}


function showOutOfGuessesModal(puzzle, dk) {
  const existing = document.getElementById('oog-modal');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'oog-modal';
  overlay.innerHTML = `<div class="modal">
    <h2>Oops!</h2>
    <p>You've run out of guesses.<br>Keep playing or reveal the connections?</p>
    <div class="modal-btns">
      <button class="btn-keep" onclick="keepPlaying()">Keep playing</button>
      <button class="btn-reveal" onclick="revealAnswers()">Reveal answers</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function keepPlaying() {
  const modal = document.getElementById('oog-modal');
  if (modal) modal.remove();
  // Unlimited guesses from here — reset the bubble display to show 0 remaining but don't block
  gameState.unlimited = true;
  const bubblesEl = document.getElementById('bubbles');
  if (bubblesEl) bubblesEl.parentElement.style.display = 'none';
}

async function revealAnswers() {
  const modal = document.getElementById('oog-modal');
  if (modal) modal.remove();
  const dk = gameState.dateKey || todayKey();
  const puzzle = await getPuzzle(dk);
  gameState.done = true;
  gameState.selected = [];
  saveProgress(dk, gameState);
  revealAll(puzzle);
  setTimeout(() => showResultPanel(puzzle, dk), 600);
}

// ---- GAME ----
async function renderGame(dateKey) {
  const wrap = document.getElementById('game-wrap');
  const dk = dateKey || todayKey();
  const puzzle = await getPuzzle(dk);

  if (!puzzle) {
    wrap.innerHTML = `<div class="no-puzzle"><strong>No puzzle ${dateKey ? 'for this date' : 'today'}</strong>Check back soon — or set one up in the Admin panel.</div>`;
    return;
  }

  const saved = getProgress(dk);
  if (saved && saved.tiles) {
    gameState = saved;
    gameState.tiles = gameState.tiles || buildTiles(puzzle);
  } else {
    let allWords = buildTiles(puzzle);
    gameState = {selected:[], guessesUsed:0, guessLog:[], solved:[], done:false, tiles:shuffle(allWords), dateKey:dk};
  }

  const isArchive = dk !== todayKey();
  wrap.innerHTML = `
    <p class="puzzle-date">${formatDateDisplay(dk)}${isArchive ? ' <span style="color:#A67BC8;font-weight:600">· archive</span>' : ''}</p>
    <p class="instructions">Create four groups of four!</p>
    <div id="solved-area"></div>
    <div class="grid" id="tile-grid"></div>
    <div class="guesses-wrap">
      <span>Guesses remaining:</span>
      <span class="bubbles" id="bubbles">${renderBubbles(gameState.guessesUsed)}</span>
    </div>
    <div class="one-away" id="one-away"></div>
    <div class="btn-row">
      <button onclick="shuffleTiles()">Shuffle</button>
      <button id="desel-btn" onclick="deselect()" disabled>Deselect all</button>
      <button class="btn-primary" id="submit-btn" onclick="submitGuess()" disabled>Submit</button>
    </div>
    <div id="result-panel-wrap"></div>
  `;

  gameState.solved.forEach(s => renderSolvedRow(s, puzzle, false));
  renderTiles();
  if (gameState.done) showResultPanel(puzzle, dk);
}

function buildTiles(puzzle) {
  let t = [];
  puzzle.categories.forEach((cat,ci) => {
    cat.words.forEach(w => t.push({word:w.toUpperCase(), catIdx:ci}));
  });
  return t;
}

function renderBubbles(used) {
  return [0,1,2,3].map(i => `<div class="bubble${i < used ? ' used' : ''}"></div>`).join('');
}

function renderTiles() {
  const grid = document.getElementById('tile-grid');
  if (!grid) return;
  const solvedCats = new Set(gameState.solved.map(s => s.catIdx));
  grid.innerHTML = '';
  gameState.tiles.forEach((t, i) => {
    if (solvedCats.has(t.catIdx)) return;
    const div = document.createElement('div');
    div.className = 'tile' + (gameState.selected.includes(i) ? ' selected' : '');
    div.textContent = t.word;
    div.onclick = () => toggleTile(i);
    div.id = `tile-${i}`;
    grid.appendChild(div);
  });
  const cnt = gameState.selected.length;
  const submitBtn = document.getElementById('submit-btn');
  const deselBtn = document.getElementById('desel-btn');
  if (submitBtn) submitBtn.disabled = cnt !== 4 || gameState.done;
  if (deselBtn) deselBtn.disabled = cnt === 0;
}

function toggleTile(i) {
  if (gameState.done) return;
  const idx = gameState.selected.indexOf(i);
  if (idx >= 0) {
    gameState.selected.splice(idx, 1);
  } else {
    if (gameState.selected.length >= 4) return;
    gameState.selected.push(i);
  }
  renderTiles();
}

function deselect() { gameState.selected = []; renderTiles(); }
function shuffleTiles() {
  const solvedCats = new Set(gameState.solved.map(s => s.catIdx));
  const unsolved = gameState.tiles.filter(t => !solvedCats.has(t.catIdx));
  const shuffled = shuffle(unsolved);
  gameState.tiles = [...gameState.tiles.filter(t => solvedCats.has(t.catIdx)), ...shuffled];
  gameState.selected = [];
  renderTiles();
}

async function submitGuess() {
  if (gameState.selected.length !== 4 || gameState.done) return;
  const dk = gameState.dateKey || todayKey();
  const puzzle = await getPuzzle(dk);
  const sel = gameState.selected.map(i => gameState.tiles[i]);
  const catCounts = {};
  sel.forEach(t => { catCounts[t.catIdx] = (catCounts[t.catIdx] || 0) + 1; });
  const entries = Object.entries(catCounts);

  const guessSnapshot = sel.map(t => t.catIdx);
  gameState.guessLog.push(guessSnapshot);

  if (entries.length === 1) {
    const catIdx = parseInt(entries[0][0]);
    document.getElementById('one-away').textContent = '';
    sel.forEach(t => {
      const match = gameState.tiles.findIndex(tt => tt.word === t.word && tt.catIdx === t.catIdx);
      const el = document.getElementById(`tile-${match}`);
      if (el) { el.classList.add('pop'); setTimeout(() => el.classList.remove('pop'), 300); }
    });
    setTimeout(() => {
      const solvedEntry = {catIdx, words: sel.map(t => t.word)};
      gameState.solved.push(solvedEntry);
      gameState.selected = [];
      renderSolvedRow(solvedEntry, puzzle, true);
      renderTiles();
      if (gameState.solved.length === 4) {
        gameState.done = true;
        saveProgress(dk, gameState);
        setTimeout(() => showResultPanel(puzzle, dk), 400);
      } else {
        saveProgress(dk, gameState);
      }
    }, 350);
  } else {
    const isOneAway = entries.some(([,c]) => c === 3);
    const oa = document.getElementById('one-away');

    gameState.guessesUsed++;
    document.getElementById('bubbles').innerHTML = renderBubbles(gameState.guessesUsed);

    // Shake the selected tiles but keep them selected (dark) until player deselects
    gameState.selected.forEach(i => {
      const el = document.getElementById(`tile-${i}`);
      if (el) {
        el.classList.add('shake');
        setTimeout(() => el.classList.remove('shake'), 500);
      }
    });

    if (!gameState.unlimited && gameState.guessesUsed >= MAX_GUESSES) {
      oa.textContent = '';
      gameState.selected = [];
      saveProgress(dk, gameState);
      renderTiles();
      setTimeout(() => showOutOfGuessesModal(puzzle, dk), 550);
    } else {
      oa.textContent = isOneAway ? 'One away...' : '';
      if (isOneAway) setTimeout(() => { if (oa) oa.textContent = ''; }, 2000);
      // Keep selection intact — tiles stay dark until player clicks Deselect or taps them
      saveProgress(dk, gameState);
      // Re-enable submit button since we still have 4 selected
      const submitBtn = document.getElementById('submit-btn');
      if (submitBtn) submitBtn.disabled = false;
    }
  }
}

function renderSolvedRow(s, puzzle, animate) {
  const area = document.getElementById('solved-area');
  if (!area) return;
  const cat = puzzle.categories[s.catIdx];
  const cfg = CATS[s.catIdx];
  const row = document.createElement('div');
  row.className = 'solved-row';
  if (!animate) row.style.animation = 'none';
  row.style.background = cfg.color;
  row.innerHTML = `<span class="cat-label">${escHtml(cat.name)}</span><span class="cat-words">${s.words.join(', ')}</span>`;
  area.appendChild(row);
}

function revealAll(puzzle) {
  const solvedCats = new Set(gameState.solved.map(s => s.catIdx));
  const grid = document.getElementById('tile-grid');
  if (grid) grid.innerHTML = '';
  CATS.forEach((cfg, i) => {
    if (solvedCats.has(i)) return;
    const cat = puzzle.categories[i];
    const area = document.getElementById('solved-area');
    const row = document.createElement('div');
    row.className = 'solved-row';
    row.style.background = cfg.color;
    row.style.opacity = '0.65';
    row.innerHTML = `<span class="cat-label">${escHtml(cat.name)}</span><span class="cat-words">${cat.words.map(w=>w.toUpperCase()).join(', ')}</span>`;
    area.appendChild(row);
  });
}

function showResultPanel(puzzle, dk) {
  const wrap = document.getElementById('result-panel-wrap');
  if (!wrap) return;
  const won = gameState.solved.length === 4;
  const title = won ? (gameState.guessesUsed === 4 ? 'Solved! Just barely.' : gameState.guessesUsed <= 2 ? 'Excellent!' : 'Solved!') : 'Better luck next time!';
  const sub = won ? `Solved in ${gameState.guessesUsed} guess${gameState.guessesUsed!==1?'es':''}` : 'No guesses remaining';

  const gridHtml = gameState.guessLog.map(guess => {
    const row = guess.map(ci => `<div class="share-sq" style="background:${CATS[ci].color}"></div>`).join('');
    return `<div class="share-row">${row}</div>`;
  }).join('');

  const shareText = buildShareText(puzzle, dk);

  wrap.innerHTML = `<div class="result-panel">
    <h2>${title}</h2>
    <p class="sub">${sub}</p>
    <div class="share-grid">${gridHtml}</div>
    <button class="copy-btn" onclick="copyShare()">Copy results</button>
    <div class="copy-confirm" id="copy-confirm"></div>
  </div>`;
  wrap._shareText = shareText;
}

function buildShareText(puzzle, dk) {
  const dateStr = formatDateDisplay(dk);
  let text = `Connections\n${dateStr}\n\n`;
  text += gameState.guessLog.map(guess =>
    guess.map(ci => CAT_EMOJI[ci]).join('')
  ).join('\n');
  if (gameState.solved.length < 4) text += '\n\n❌ Not solved';
  return text;
}

function copyShare() {
  const wrap = document.getElementById('result-panel-wrap');
  const text = wrap._shareText || '';
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('copy-confirm');
    if (el) { el.textContent = 'Copied to clipboard!'; setTimeout(() => { if(el) el.textContent=''; }, 2500); }
  }).catch(() => {
    const el = document.getElementById('copy-confirm');
    if (el) el.textContent = 'Could not copy — try manually.';
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ---- ARCHIVE ----
let archivePage = 1;
const ARCHIVE_PER_PAGE = 10;

async function renderArchive(page) {
  archivePage = page || 1;
  const wrap = document.getElementById('archive-wrap');
  const all = await getAllPuzzles();
  const keys = Object.keys(all).sort().reverse();
  const today = todayKey();

  if (keys.length === 0) {
    wrap.innerHTML = '<div class="archive-empty">No puzzles yet. Publish one from the Admin panel.</div>';
    return;
  }

  const totalPages = Math.ceil(keys.length / ARCHIVE_PER_PAGE);
  const pageKeys = keys.slice((archivePage-1)*ARCHIVE_PER_PAGE, archivePage*ARCHIVE_PER_PAGE);

  const items = pageKeys.map(k => {
    const prog = getProgress(k);
    const played = prog && prog.done;
    const dots = CATS.map((cfg) => '<div class="archive-dot" style="background:'+cfg.color+'"></div>').join('');
    const isToday = k === today;
    const badge = played
      ? '<span class="archive-badge played">Played</span>'
      : '<span class="archive-badge">Play</span>';
    const todayTag = isToday ? ' <span style="color:#A67BC8;font-size:11px;font-weight:700;margin-left:4px">Today</span>' : '';
    return '<div class="archive-item" onclick="showGame(\'' + k + '\')"><div><div class="date">' + formatDateDisplay(k) + todayTag + '</div><div style="display:flex;gap:4px;margin-top:6px">' + dots + '</div></div>' + badge + '</div>';
  }).join('');

  const pagination = totalPages > 1 ? buildPagination(archivePage, totalPages) : '';
  wrap.innerHTML = '<div class="archive-list">' + items + '</div>' + pagination;
}

function buildPagination(current, total) {
  const show = new Set([1, total, current, current-1, current+1].filter(p => p >= 1 && p <= total));
  const sorted = [...show].sort((a,b) => a-b);
  let html = '<div class="pagination">';
  if (current > 1) html += '<button class="page-btn" onclick="renderArchive(' + (current-1) + ')" title="Previous">&#8249;</button>';
  let prev = null;
  for (const p of sorted) {
    if (prev !== null && p - prev > 1) html += '<span class="page-btn ellipsis">&#8230;</span>';
    html += '<button class="page-btn' + (p === current ? ' current' : '') + '" onclick="renderArchive(' + p + ')">' + p + '</button>';
    prev = p;
  }
  if (current < total) html += '<button class="page-btn" onclick="renderArchive(' + (current+1) + ')" title="Next">&#8250;</button>';
  html += '</div>';
  return html;
}

// ---- ADMIN ----
function renderAdmin() {
  const wrap = document.getElementById('admin-wrap');
  if (!adminAuthed) {
    wrap.innerHTML = `<div class="login-card">
      <h2>Admin login</h2>
      <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter') tryLogin()"/>
      <button class="btn-primary" onclick="tryLogin()">Sign in</button>
      <div class="login-error" id="login-err"></div>
    </div>`;
    return;
  }
  renderEditor();
}

function tryLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === PASS) { adminAuthed = true; renderEditor(); }
  else { document.getElementById('login-err').textContent = 'Incorrect password.'; }
}

async function renderEditor(prefillDate) {
  const wrap = document.getElementById('admin-wrap');
  const dk = prefillDate || todayKey();
  const puzzle = (await getPuzzle(dk)) || {categories: CATS.map(c => ({name:'', words:['','','',''], difficulty:c.key}))};

  let html = `<p class="admin-subhead">Create a puzzle for any date. Players can find past puzzles in the Archive.</p>
  <div class="admin-date-row">
    <label>Puzzle date</label>
    <input type="date" id="puzzle-date" value="${dk}"/>
    <button style="padding:6px 14px;font-size:12px" onclick="loadDatePuzzle()">Load</button>
  </div>`;

  CATS.forEach((cfg, i) => {
    const cat = puzzle.categories[i] || {name:'', words:['','','','']};
    html += `<div class="cat-card">
      <div class="cat-card-header">
        <div class="color-dot" style="background:${cfg.color}"></div>
        <span class="diff-label" style="background:${cfg.color}">${cfg.label}</span>
      </div>
      <label>Category name</label>
      <input type="text" id="cat-name-${i}" value="${escHtml(cat.name||'')}" placeholder="e.g. Things that are blue"/>
      <label>Words (4 required)</label>
      <div class="words-grid">
        ${cat.words.map((w,j) => `<input type="text" id="word-${i}-${j}" value="${escHtml(w||'')}" placeholder="Word ${j+1}"/>`).join('')}
      </div>
    </div>`;
  });

  html += `<div class="admin-footer">
    <span class="publish-status" id="pub-status"></span>
    <button onclick="clearEditorPuzzle()">Clear</button>
    <button class="btn-primary" onclick="publishPuzzle()">Publish puzzle</button>
  </div>`;
  wrap.innerHTML = html;
}

async function loadDatePuzzle() {
  const dk = document.getElementById('puzzle-date').value;
  if (!dk) return;
  await renderEditor(dk);
}

async function publishPuzzle() {
  const dk = document.getElementById('puzzle-date').value || todayKey();
  const categories = CATS.map((cfg, i) => {
    const name = document.getElementById(`cat-name-${i}`).value.trim();
    const words = [0,1,2,3].map(j => document.getElementById(`word-${i}-${j}`).value.trim());
    return {name, words, difficulty: cfg.key};
  });
  const errors = [];
  categories.forEach((cat, i) => {
    if (!cat.name) errors.push(`Category ${i+1} (${CATS[i].label}) needs a name.`);
    cat.words.forEach((w,j) => { if (!w) errors.push(`Category ${i+1}, word ${j+1} is empty.`); });
  });
  const allWords = categories.flatMap(c => c.words.map(w => w.toLowerCase().trim()));
  const dupes = allWords.filter((w,i) => allWords.indexOf(w) !== i && w);
  if (dupes.length) errors.push(`Duplicate word: "${dupes[0]}"`);
  const st = document.getElementById('pub-status');
  if (errors.length) {
    st.className = 'publish-status pub-error';
    st.textContent = errors[0];
    return;
  }
  const ok = await savePuzzle(dk, {categories, publishedAt: new Date().toISOString()});
  if (!ok) { st.className = "publish-status pub-error"; st.textContent = "Database error — check Supabase."; return; }
  st.className = 'publish-status';
  st.textContent = `Published for ${formatDateDisplay(dk)} ✓`;
  setTimeout(() => { if (st) st.textContent = ''; }, 4000);
}

async function clearEditorPuzzle() {
  const dk = document.getElementById('puzzle-date') ? document.getElementById('puzzle-date').value : todayKey();
  if (!confirm(`Clear the puzzle for ${formatDateDisplay(dk)}?`)) return;
  await dbDeletePuzzle(dk);
  delete _puzzleCache[dk];
  await renderEditor(dk);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

renderGame();  // async, fire and forget
